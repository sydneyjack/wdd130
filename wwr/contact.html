<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and adventure trip information.">
    <meta name="author" content="Sobomabo Boma Sydney">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/whitewaterlogo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact White Water Rafting</h1>

        <!-- COMPANY INFO -->
        <section class="contact-info">
            <h2>White Water Rafting Company</h2>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-layout">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=utah%20river%20rafting&output=embed"
                  height="300" loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <div class="contact-form">
                <form>

                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <p>Purpose of Message</p>

                    <label><input type="radio" name="purpose" value="general"> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>

                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <label>
                        <input type="checkbox" name="subscribe">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>

                </form>
            </div>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/john.jpg" alt="Lead rafting guide">
                    <figcaption>John – Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/sarah.jpg" alt="Adventure rafting instructor">
                    <figcaption>Sarah – Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/sarah.jpg" alt="Rafting expedition leader">
                    <figcaption>Mike – Expedition Leader</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>©2026 White Water Rafting | Sobomabo Boma Sydney</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.jpg" alt="Facebook icon"></a>
            <a href="#"><img src="images/instagram.jpg" alt="Instagram icon"></a>
            <a href="#"><img src="images/xlogo.png" alt="X social media icon"></a>
        </nav>
    </footer>

</body>

</html>
