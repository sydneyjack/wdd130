<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact White Water Rafting for reservations, questions, and adventure trip information.">
    <meta name="author" content="Sobomabo Boma Sydney">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/whitewaterlogo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact White Water Rafting</h1>

        <!-- COMPANY INFO -->
        <section>
            <h2>Contact Information</h2>
            <p><strong>Address:</strong> 123 River Road, Utah, USA</p>
            <p><strong>Phone:</strong> +1 234 567 890</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>

            <!-- FIXED IFRAME (no width="100%") -->
            <iframe src="https://www.google.com/maps?q=utah%20river%20rafting&output=embed"
              height="300" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

        <!-- EMPLOYEES -->
        <section>
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/rafting1.jpg" alt="Lead rafting guide">
                <figcaption>John – Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/rafting2.jpg" alt="Adventure rafting instructor">
                <figcaption>Sarah – Instructor</figcaption>
            </figure>

            <figure>
                <img src="images/rafting3.jpg" alt="Rafting expedition leader">
                <figcaption>Mike – Expedition Leader</figcaption>
            </figure>

        </section>

        <!-- FORM -->
        <section>
            <h2>Send Us a Message</h2>

            <form>

                <!-- NAME -->
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <!-- EMAIL -->
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <!-- RADIO OPTIONS (FIXED IDs) -->
                <p>Purpose of Message:</p>

                <input type="radio" id="general" name="purpose" value="general">
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label>

                <!-- TEXTAREA (ADDED — THIS WAS MISSING) -->
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <!-- CHECKBOX (FIXED ID) -->
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label>

                <!-- BUTTON -->
                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer>
        <p>©2026 White Water Rafting | Sobomabo Boma Sydney</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.jpg" alt="Facebook icon"></a>
            <a href="#"><img src="images/instagram.jpg" alt="Instagram icon"></a>
            <a href="#"><img src="images/xlogo.png" alt="X social media icon"></a>
        </nav>
    </footer>

</body>

</html>
